<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel da Loja de Celulares</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4 text-center text-primary">📱 Estoque da Loja de Celulares</h1>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            <strong th:text="${produtoObjeto.id != null} ? 'Editar Produto (ID: ' + ${produtoObjeto.id} + ')' : 'Adicionar Novo Produto'">Adicionar Novo Produto</strong>
        </div>
        <div class="card-body">
            <form th:action="@{/web/produtos}" th:object="${produtoObjeto}" method="POST" class="row g-3">
                <input type="hidden" th:field="*{id}">

                <div class="col-md-4"><input type="text" th:field="*{nome}" class="form-control" placeholder="Nome do Produto" required></div>
                <div class="col-md-4"><input type="text" th:field="*{marca}" class="form-control" placeholder="Marca" required></div>
                <div class="col-md-4"><input type="text" th:field="*{categoria}" class="form-control" placeholder="Categoria" required></div>
                <div class="col-md-6"><input type="text" th:field="*{descricao}" class="form-control" placeholder="Descrição curta"></div>
                <div class="col-md-3"><input type="number" step="0.01" th:field="*{preco}" class="form-control" placeholder="Preço (R$)" required></div>
                <div class="col-md-3"><input type="number" th:field="*{estoque}" class="form-control" placeholder="Qtd Estoque" required></div>

                <div class="col-12 text-end">
                    <a th:if="${produtoObjeto.id != null}" th:href="@{/web/produtos}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-success px-4" th:text="${produtoObjeto.id != null} ? 'Atualizar Produto' : 'Salvar Produto'">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white"><strong>Produtos em Estoque</strong></div>
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Nome</th><th>Marca</th><th>Categoria</th><th>Descrição</th><th>Preço</th><th>Estoque</th><th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.nome}"></td>
                    <td th:text="${p.marca}"></td>
                    <td th:text="${p.categoria}"></td>
                    <td th:text="${p.descricao}"></td>
                    <td th:text="'R$ ' + ${#numbers.formatDecimal(p.preco, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td th:text="${p.estoque}"></td>
                    <td>
                        <a th:href="@{/web/produtos(editarId=${p.id})}" class="btn btn-warning btn-sm text-white me-1">Editar</a>
                        <a th:href="@{/web/produtos/deletar/{id}(id=${p.id})}" class="btn btn-danger btn-sm">Excluir</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(produtos)}">
                    <td colspan="8" class="text-center text-muted py-4">Nenhum produto cadastrado no estoque ainda.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
